# -------------------------------------------------------------------
# go-common 初始化配置（新项目起步模板）
# 当前版本：v1.3.1
#
# 适用场景：
# 1. 新项目首次接入 go-common
# 2. 希望先跑起来，再逐步补工作流 / LDAP 等高级能力
#
# 使用原则：
# - 这个文件只保留“最常用、最容易跑通”的基础配置
# - 更完整的解释和全部可选项，请看同目录下的 config.latest.yaml
# -------------------------------------------------------------------

# 服务名：建议写成业务项目唯一标识。
service_name: your-service-name

# 服务监听地址。
addr: ":9081"

databases:
  # 默认主库：MySQL。
  mysql:
    default:
      # 默认数据库实例名。
      db_name: default_mysql
      # 运行模式，通常 single 即可。
      mode: single
      host: 127.0.0.1
      port: 3306
      user: root
      password: your_password
      database: your_database
      # 等价于旧 DSN 中的 charset=utf8mb4。
      charset: utf8mb4
      # 等价于旧 DSN 中的 parseTime=True。
      parse_time: true
      # 等价于旧 DSN 中的 loc=Local。
      loc: Local
      max_open_conn: 100
      max_idle_conn: 10
      conn_max_life_time: 300s
      slow_time: 5
      log_mode: info

  # 默认 Redis：建议保留。
  redis:
    default:
      db_name: default_redis
      mode: single
      host: 127.0.0.1
      port: 6379
      # 测试环境可留空，生产环境如配置密码请填写。
      password:
      database: 0
      timeout: 5
      max_pool_size: 100
      min_pool_size: 10

workflow:
  api:
    # 是否启用工作流标准接口。
    enabled: false
    # 工作流接口前缀。
    prefix: "/api"
    # 是否要求登录态。
    sso_enabled: true
    # 留空表示走默认角色集合。
    roles: ""
    callback_path: "/flowable/callback"
    callback_secret: ""

  flowable:
    # 只有启用工作流并接入 Flowable 时才需要填写。
    base_url: ""
    username: ""
    password: ""
    timeout_seconds: 15
    group_prefix: ""
    role_prefix: "role_"

  context:
    # raw：直接使用登录态用户 ID。
    user_id_strategy: raw
    # username_suffix 策略时使用的分隔符。
    user_id_delimiter: "#"
    user_id_header: "X-Workflow-User-ID"
    user_name_header: "X-Workflow-User-Name"
    system_code_header: "X-System-Code"
    groups_header: "X-Workflow-Groups"
    roles_header: "X-Workflow-Roles"

  directory:
    # none / ldap。
    provider: none

  assignment:
    # none / directory / ldap。
    provider: none
