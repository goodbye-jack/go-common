app:
  name: go-common
  env: local

server:
  addr: ":8088"
  host: 0.0.0.0
  port: 8088
  uc_addr: "0.0.0.0:8081"
  http:
    read_header_timeout: 15s
    read_timeout: 30m
    write_timeout: 30m
    idle_timeout: 2m

security:
  cookie:
    name: good_token
    expired_seconds: 36000

storage:
  local:
    base_path: ""
    relative_path_prefix: ""
    cleanup_after_upload: false

workflow:
  api:
    enabled: true
    prefix: /api/v1/workflow
    sso_enabled: true
    callback_path: /flowable/callback
    callback_secret:
  context:
    user_id_strategy: username_suffix
    user_id_delimiter: "#"
    user_name_header: X-Workflow-User-Name
    system_code_header: X-System-Code
    groups_header: X-Workflow-Groups
    roles_header: X-Workflow-Roles
  identity:
    # 这段配置用于把 LDAP / JWT 等不同来源的身份编码，归一成 Flowable 最终使用的业务角色编码。
    # 适用场景：希望不同登录来源切换时不改 BPMN 候选组；BPMN 里统一写 role_APP_ROLE_*。
    role_aliases:
      LDAP_ROLE_CITY_REVIEWER: APP_ROLE_CITY_REVIEW
      LDAP_ROLE_CITY_LEADER: APP_ROLE_CITY_REVIEW
      LDAP_ROLE_COUNTY_OWNER: APP_ROLE_COUNTY_REVIEW
      LDAP_ROLE_FIELD_REPORTER: APP_ROLE_BASE_REPORT
#    group_aliases:
#      CITY_REVIEWERS: city_reviewers
  directory:
    provider: none # none | ldap
#    ldap:
#      addr: ldap://127.0.0.1:8389
#      bind_dn: cn=admin,dc=example,dc=com
#      bind_password: password
#      base_dn: dc=example,dc=com
#      people_ou: ou=people
#      department_ou: ou=departments
#      position_ou: ou=positions
#      use_tls: false
  assignment:
    provider: none # none | directory | ldap
#    variable_keys:
#      assignee: nextAssignee
#      candidate_users: nextCandidateUsers
#      candidate_groups: nextCandidateGroups
  flowable:
    base_url: http://127.0.0.1:8087/flowable-rest/service
    username: rest-admin
    password: test
    timeout_seconds: 15
    role_prefix: role_
  formref:
    db_instance: flowable_meta

databases:
  mysql:
    default:
      db_name: default_mysql
      mode: single
      host: 127.0.0.1
      port: 3306
      user: root
      password: 12345678
      database: warmcity
      charset: utf8mb4
      parse_time: true
      loc: Local
      max_open_conn: 100
      max_idle_conn: 10
      conn_max_life_time: 300s
      slow_time: 5 # 慢查询阈值5秒（可选，默认3秒）
      log_mode: info
