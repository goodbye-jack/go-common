  redis:
    default:
      db_name: default_redis
      mode: single       # 单点模式
      host: 127.0.0.1
      port: 6379
      password: 
      database: 0        # Redis DB索引
      timeout: 5         # 初始化超时5秒
      max_pool_size: 100
      min_pool_size: 10
  mongo:
    default:
      db_name: default_mongo
      mode: single       # 单点
      host: 127.0.0.1
      port: 27017
